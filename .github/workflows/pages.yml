name: Publish GitHub Pages

on:
  workflow_dispatch:
#  push:
#    branches:
#      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-pages.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pages.txt

      - name: Build Pages artifact
        run: |
          make pages-site

      - name: Verify built site
        run: |
          ls -la .make-tmp/pages-site
          test -f .make-tmp/pages-site/index.html
          test -f .make-tmp/pages-site/ru/book/index.html
          test -f .make-tmp/pages-site/en/book/index.html
          test -f .make-tmp/pages-site/ru/slides/index.html
          test -f .make-tmp/pages-site/en/slides/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .make-tmp/pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
