project:
  type: book

book:
  title: "Статистический анализ"
  subtitle: "Конспект курса с вычислительными ноутбуками"
  author: "Дмитрий Наумов"
  chapters:
    - index.qmd
    - preface.qmd
    - syllabus.qmd
    - chapters/probability.qmd
    - chapters/poisson_gaussian.qmd
    - chapters/likelihood.qmd
    - chapters/fitting.qmd
    - chapters/intervals.qmd
    - chapters/feldman_cousins.qmd
    - chapters/hypothesis_tests.qmd
    - chapters/systematics.qmd
    - chapters/neutrino_cases.qmd

bibliography: references.bib
lang: ru

format:
  html:
    toc: true
    number-sections: true
    html-math-method: mathjax
  pdf:
    documentclass: scrbook
    toc: true
    number-sections: true
    pdf-engine: xelatex
    include-in-header:
      - macros.tex
